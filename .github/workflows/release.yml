name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write   # required for PyPI Trusted Publishing

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentdeploy
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # We don't ship a uv.lock — use pyproject.toml as the cache key.
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        # Uses Trusted Publishing — configure on PyPI under
        # Project → Settings → Publishing → "Add a new pending publisher".
        # Repo: erenat77/agentdeploy, workflow: release.yml, environment: pypi
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
